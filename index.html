<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shared Drawing Board</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    overflow:hidden;
}

#topbar{
    height:60px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.color{
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid white;
}

canvas{
    display:block;
    background:white;
    touch-action:none;
}

#info{
    position:absolute;
    top:70px;
    left:10px;
    background:rgba(0,0,0,.7);
    padding:6px 10px;
    border-radius:8px;
}
</style>
</head>
<body>

<div id="topbar">
    <div class="color" style="background:black" data-color="#000000"></div>
    <div class="color" style="background:red" data-color="#ff0000"></div>
    <div class="color" style="background:orange" data-color="#ff8800"></div>
    <div class="color" style="background:yellow" data-color="#ffff00"></div>
    <div class="color" style="background:green" data-color="#00cc00"></div>
    <div class="color" style="background:cyan" data-color="#00ffff"></div>
    <div class="color" style="background:blue" data-color="#0066ff"></div>
    <div class="color" style="background:purple" data-color="#aa00ff"></div>
    <div class="color" style="background:pink" data-color="#ff55aa"></div>
</div>

<div id="info">Shared Canvas • Auto clears every hour</div>

<canvas id="canvas"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    get,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBED5YhUVswL69UQza4RYXixKufPxD_Iac",
  authDomain: "project-7656380588312547449.firebaseapp.com",
  databaseURL: "https://project-7656380588312547449-default-rtdb.firebaseio.com",
  projectId: "project-7656380588312547449",
  storageBucket: "project-7656380588312547449.firebasestorage.app",
  messagingSenderId: "984338369464",
  appId: "1:984338369464:web:024e5bee9eaa3ab7a81d4d",
  measurementId: "G-BTHNSJFY16"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
    redrawBackground();
}
window.addEventListener("resize",resize);
resize();

function redrawBackground(){
    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

let currentColor="#000000";

document.querySelectorAll(".color").forEach(btn=>{
    btn.onclick=()=>{
        currentColor=btn.dataset.color;
    };
});

let drawing=false;
let lastX,lastY;

function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;

    return {
        x:t.clientX-r.left,
        y:t.clientY-r.top
    };
}

function drawLine(data){
    ctx.beginPath();
    ctx.moveTo(data.x1,data.y1);
    ctx.lineTo(data.x2,data.y2);
    ctx.strokeStyle=data.color;
    ctx.lineWidth=4;
    ctx.lineCap="round";
    ctx.stroke();
}

function start(e){
    drawing=true;
    const p=pos(e);
    lastX=p.x;
    lastY=p.y;
}

async function move(e){
    if(!drawing) return;

    e.preventDefault();

    const p=pos(e);

    const line={
        x1:lastX,
        y1:lastY,
        x2:p.x,
        y2:p.y,
        color:currentColor
    };

    drawLine(line);

    push(ref(db,"strokes"),line);

    lastX=p.x;
    lastY=p.y;
}

function stop(){
    drawing=false;
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
window.addEventListener("mouseup",stop);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
window.addEventListener("touchend",stop);

const hourRef = ref(db,"hourBucket");

async function checkHourReset(){

    const currentHour=Math.floor(Date.now()/3600000);

    const snap=await get(hourRef);

    if(!snap.exists() || snap.val()!==currentHour){

        await set(ref(db,"strokes"),null);
        await set(hourRef,currentHour);

        location.reload();
    }
}

checkHourReset();
setInterval(checkHourReset,30000);

onChildAdded(ref(db,"strokes"),snap=>{
    drawLine(snap.val());
});

</script>

</body>
</html>
