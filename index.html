<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shared Drawing Board</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    overflow:hidden;
}

#topbar{
    height:60px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.color{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid white;
    cursor:pointer;
}

canvas{
    display:block;
    background:white;
    touch-action:none;
}

/* popup */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

#popupBox{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    text-align:center;
}
</style>
</head>

<body>

<!-- RULE POPUP -->
<div id="popup">
  <div id="popupBox">
    <h2>Rules</h2>
    <p>
      No swearing, inappropriate drawings, or spam.<br>
      Be respectful so everyone can enjoy it.
    </p>
    <button onclick="closePopup()">I Understand</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="topbar">
    <button onclick="setDraw()">✏️ Draw</button>
    <button onclick="setEraser()">🧽 Eraser</button>

    <div class="color" style="background:black" data-color="#000000"></div>
    <div class="color" style="background:red" data-color="#ff0000"></div>
    <div class="color" style="background:orange" data-color="#ff8800"></div>
    <div class="color" style="background:yellow" data-color="#ffff00"></div>
    <div class="color" style="background:green" data-color="#00cc00"></div>
    <div class="color" style="background:blue" data-color="#0066ff"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    get,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBED5YhUVswL69UQza4RYXixKufPxD_Iac",
  authDomain: "project-7656380588312547449.firebaseapp.com",
  databaseURL: "https://project-7656380588312547449-default-rtdb.firebaseio.com",
  projectId: "project-7656380588312547449",
  storageBucket: "project-7656380588312547449.firebasestorage.app",
  messagingSenderId: "984338369464",
  appId: "1:984338369464:web:024e5bee9eaa3ab7a81d4d",
  measurementId: "G-BTHNSJFY16"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 60;
    ctx.fillStyle="white";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}
window.addEventListener("resize",resize);
resize();

/* popup */
window.closePopup = () => {
    document.getElementById("popup").style.display="none";
};

/* tool state */
let mode = "draw"; // draw or erase
let color = "#000000";

window.setDraw = () => mode = "draw";
window.setEraser = () => mode = "erase";

/* colors */
document.querySelectorAll(".color").forEach(c=>{
    c.onclick=()=>{
        color=c.dataset.color;
        mode="draw";
    };
});

let drawing=false;
let lastX,lastY;

function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;

    return {
        x:t.clientX-r.left,
        y:t.clientY-r.top
    };
}

function drawLine(d){
    ctx.beginPath();
    ctx.moveTo(d.x1,d.y1);
    ctx.lineTo(d.x2,d.y2);
    ctx.strokeStyle=d.color;
    ctx.lineWidth=2;
    ctx.lineCap="round";
    ctx.stroke();
}

function start(e){
    drawing=true;
    const p=pos(e);
    lastX=p.x;
    lastY=p.y;
}

function move(e){
    if(!drawing) return;
    e.preventDefault();

    const p=pos(e);

    const line = {
        x1:lastX,
        y1:lastY,
        x2:p.x,
        y2:p.y,
        color: (mode === "erase") ? "#ffffff" : color
    };

    drawLine(line);
    push(ref(db,"strokes"),line);

    lastX=p.x;
    lastY=p.y;
}

function stop(){
    drawing=false;
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
window.addEventListener("mouseup",stop);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
window.addEventListener("touchend",stop);

/* realtime */
onChildAdded(ref(db,"strokes"),snap=>{
    drawLine(snap.val());
});

/* hourly reset */
const hourRef = ref(db,"hourBucket");

async function checkHourReset(){
    const h=Math.floor(Date.now()/3600000);
    const snap=await get(hourRef);

    if(!snap.exists() || snap.val()!==h){
        await set(ref(db,"strokes"),null);
        await set(hourRef,h);
        location.reload();
    }
}

checkHourReset();
setInterval(checkHourReset,30000);

</script>

</body>
</html>
