<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Draw Board</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:radial-gradient(circle at top,#0f0f1a,#050510);
    color:white;
}

/* glass toolbar */
#topbar{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:8px;
    backdrop-filter: blur(12px);
    background:rgba(255,255,255,0.06);
    border-bottom:1px solid rgba(255,255,255,0.1);
    flex-wrap:wrap;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:white;
}

button:hover{
    background:rgba(255,255,255,0.2);
}

label{
    font-size:12px;
    opacity:0.8;
}

/* color dots */
.color{
    width:20px;
    height:20px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid rgba(255,255,255,0.6);
}

canvas{
    display:block;
    background:white;
    touch-action:none;
}

/* popup */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

#popupBox{
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    padding:20px;
    border-radius:14px;
    max-width:360px;
    text-align:center;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <h2>Welcome ✨</h2>
    <p>
      Be respectful:<br><br>
      • No inappropriate content<br>
      • No spam<br>
      • This website WILL be taken down if it gets out of hand<br>
    </p>
    <button onclick="closePopup()">Enter</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="topbar">
    <button onclick="setDraw()">✏️ Draw</button>
    <button onclick="setErase()">🧽 Erase</button>

    <label>Brush</label>
    <input type="range" id="brush" min="1" max="20" value="2">

    <label>Eraser</label>
    <input type="range" id="eraser" min="5" max="50" value="15">

    <div class="color" style="background:#ff004c" data-color="#ff004c"></div>
    <div class="color" style="background:#ff9900" data-color="#ff9900"></div>
    <div class="color" style="background:#ffee00" data-color="#ffee00"></div>
    <div class="color" style="background:#00ff88" data-color="#00ff88"></div>
    <div class="color" style="background:#00ccff" data-color="#00ccff"></div>
    <div class="color" style="background:#7a00ff" data-color="#7a00ff"></div>
</div>

<canvas id="canvas"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    get,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBED5YHUVswL69UQza4RYXixKufPxD_Iac",
  authDomain: "project-7656380588312547449.firebaseapp.com",
  databaseURL: "https://project-7656380588312547449-default-rtdb.firebaseio.com",
  projectId: "project-7656380588312547449",
  storageBucket: "project-7656380588312547449.firebasestorage.app",
  messagingSenderId: "984338369464",
  appId: "1:984338369464:web:024e5bee9eaa3ab7a81d4d",
  measurementId: "G-BTHNSJFY16"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 70;
}
window.addEventListener("resize",resize);
resize();

/* popup */
window.closePopup = () => {
    document.getElementById("popup").style.display="none";
};

/* tools */
let mode="draw";
let color="#ff004c";

let brushSize=2;
let eraserSize=15;

document.getElementById("brush").oninput=(e)=>{
    brushSize=Number(e.target.value);
};

document.getElementById("eraser").oninput=(e)=>{
    eraserSize=Number(e.target.value);
};

window.setDraw=()=>mode="draw";
window.setErase=()=>mode="erase";

/* colors */
document.querySelectorAll(".color").forEach(c=>{
    c.onclick=()=>{
        color=c.dataset.color;
        mode="draw";
    };
});

let drawing=false;
let lastX,lastY;

/* real draw/erase */
function applyMode(){
    ctx.globalCompositeOperation =
        mode==="erase" ? "destination-out" : "source-over";

    ctx.lineWidth =
        mode==="erase" ? eraserSize : brushSize;

    ctx.lineCap="round";
    ctx.lineJoin="round";
}

function drawLine(d){
    applyMode();

    ctx.beginPath();
    ctx.moveTo(d.x1,d.y1);
    ctx.lineTo(d.x2,d.y2);
    ctx.strokeStyle=d.color;
    ctx.stroke();
}

function pos(e){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;

    return {
        x:t.clientX-r.left,
        y:t.clientY-r.top
    };
}

function start(e){
    drawing=true;
    const p=pos(e);
    lastX=p.x;
    lastY=p.y;
}

function move(e){
    if(!drawing) return;
    e.preventDefault();

    const p=pos(e);

    push(ref(db,"strokes"),{
        x1:lastX,
        y1:lastY,
        x2:p.x,
        y2:p.y,
        color:color,
        mode:mode,
        size: mode==="erase"?eraserSize:brushSize
    });

    drawLine({
        x1:lastX,
        y1:lastY,
        x2:p.x,
        y2:p.y,
        color:color
    });

    lastX=p.x;
    lastY=p.y;
}

function stop(){
    drawing=false;
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
window.addEventListener("mouseup",stop);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
window.addEventListener("touchend",stop);

/* realtime */
onChildAdded(ref(db,"strokes"),snap=>{
    const d=snap.val();

    ctx.globalCompositeOperation =
        d.mode==="erase" ? "destination-out" : "source-over";

    ctx.lineWidth=d.size || 2;

    ctx.beginPath();
    ctx.moveTo(d.x1,d.y1);
    ctx.lineTo(d.x2,d.y2);
    ctx.strokeStyle=d.color;
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.stroke();
});

/* hourly reset */
const hourRef=ref(db,"hourBucket");

async function checkReset(){
    const h=Math.floor(Date.now()/3600000);
    const snap=await get(hourRef);

    if(!snap.exists() || snap.val()!==h){
        await set(ref(db,"strokes"),null);
        await set(hourRef,h);
        location.reload();
    }
}

checkReset();
setInterval(checkReset,30000);

</script>

</body>
</html>
